name: Plantation Tracker Android Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build PWA & Android APK/AAB
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # 3. Install dependencies
      - name: Install Dependencies
        run: npm ci

      # 4. Assemble legacy HTML from parts (needed for web build)
      - name: Assemble Legacy HTML
        run: node map.js

      # 5. Build web assets (vite only — skip Android prep scripts)
      - name: Build Web Assets
        run: npx vite build

      # 6. Sync Capacitor
      - name: Sync Capacitor Android
        run: npx cap sync android

      # 7. Generate Android icons & splash screens
      - name: Generate Android Icons
        run: node generate-android-icons.js

      # 8. JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      # 9. Fresh Gradle wrapper JAR
      - name: Restore gradle-wrapper.jar
        run: |
          mkdir -p android/gradle/wrapper
          curl -sL -o android/gradle/wrapper/gradle-wrapper.jar \
            https://raw.githubusercontent.com/gradle/gradle/v8.14.3/gradle/wrapper/gradle-wrapper.jar
          chmod +x android/gradlew

      # 10. Signing keystore
      - name: Setup Signing Keystore
        id: keystore
        run: |
          if [ -n "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.jks
            echo "keystore=secret" >> "$GITHUB_OUTPUT"
          else
            PASS=$(openssl rand -base64 24 | tr -dc 'a-zA-Z0-9' | head -c 20)
            keytool -genkeypair -v \
              -keystore android/app/release.jks \
              -alias plantation \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "$PASS" -keypass "$PASS" \
              -dname "CN=Plantation Tracker, OU=DAE, O=DAE, L=Dhaka, ST=Dhaka, C=BD"
            echo "keystore=generated" >> "$GITHUB_OUTPUT"
            echo "pass=$PASS" >> "$GITHUB_OUTPUT"
          fi

      # 11. Build Release AAB
      - name: Build Release AAB
        env:
          MYAPP_RELEASE_STORE_FILE: release.jks
          MYAPP_RELEASE_STORE_PASSWORD: ${{ steps.keystore.outputs.keystore == 'secret' && secrets.RELEASE_KEYSTORE_PASSWORD || steps.keystore.outputs.pass }}
          MYAPP_RELEASE_KEY_ALIAS: ${{ steps.keystore.outputs.keystore == 'secret' && secrets.RELEASE_KEY_ALIAS || 'plantation' }}
          MYAPP_RELEASE_KEY_PASSWORD: ${{ steps.keystore.outputs.keystore == 'secret' && secrets.RELEASE_KEY_PASSWORD || steps.keystore.outputs.pass }}
        run: cd android && ./gradlew bundleRelease --no-daemon

      # 12. Build Release APK
      - name: Build Release APK
        env:
          MYAPP_RELEASE_STORE_FILE: release.jks
          MYAPP_RELEASE_STORE_PASSWORD: ${{ steps.keystore.outputs.keystore == 'secret' && secrets.RELEASE_KEYSTORE_PASSWORD || steps.keystore.outputs.pass }}
          MYAPP_RELEASE_KEY_ALIAS: ${{ steps.keystore.outputs.keystore == 'secret' && secrets.RELEASE_KEY_ALIAS || 'plantation' }}
          MYAPP_RELEASE_KEY_PASSWORD: ${{ steps.keystore.outputs.keystore == 'secret' && secrets.RELEASE_KEY_PASSWORD || steps.keystore.outputs.pass }}
        run: cd android && ./gradlew assembleRelease --no-daemon

      # 13. Upload AAB
      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: plantation-tracker-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      # 14. Upload APK
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: plantation-tracker-signed-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      # 15. Cleanup
      - name: Cleanup Keystore
        if: always()
        run: rm -f android/app/release.jks