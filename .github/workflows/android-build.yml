name: Plantation Tracker Android Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build PWA & Android APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # 3. Install dependencies
      - name: Install Dependencies
        run: npm ci

      # 4. Assemble legacy HTML from parts (needed for web build)
      - name: Assemble Legacy HTML
        run: node map.js

      # 5. Build web assets (vite only — skip Android prep scripts)
      - name: Build Web Assets
        run: npx vite build

      # 5b. Stamp the Android version from CI so every APK is traceable to
      # the exact commit that's live — versionCode from the monotonic GH
      # Actions run number (always increases, satisfies Play/adb install
      # requirements), versionName as "<package.json version>-<short SHA>"
      # so it's human-readable at a glance (Settings -> About app).
      - name: Stamp Android version
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          PKG_VERSION=$(node -p "require('./package.json').version || '1.0'")
          VERSION_NAME="${PKG_VERSION}-${SHORT_SHA}"
          echo "Stamping versionCode=${{ github.run_number }} versionName=${VERSION_NAME}"
          sed -i "s/versionCode [0-9]\+/versionCode ${{ github.run_number }}/" android/app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"${VERSION_NAME}\"/" android/app/build.gradle
          grep -E "versionCode|versionName" android/app/build.gradle

      # 6. Sync Capacitor
      - name: Sync Capacitor Android
        run: npx cap sync android

      # 7. Generate Android icons & splash screens
      - name: Generate Android Icons
        run: node generate-android-icons.js

      # 8. JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      # 9. Fresh Gradle wrapper JAR
      - name: Restore gradle-wrapper.jar
        run: |
          mkdir -p android/gradle/wrapper
          curl -sL -o android/gradle/wrapper/gradle-wrapper.jar \
            https://raw.githubusercontent.com/gradle/gradle/v8.14.3/gradle/wrapper/gradle-wrapper.jar
          chmod +x android/gradlew

      # 10. Setup signing keystore + inject gradle.properties
      - name: Setup Signing Keystore
        id: keystore
        run: |
          if [ -n "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.jks
            # Write signing config directly into gradle.properties (most reliable)
            cat >> android/gradle.properties << 'SIGNING_EOF'
          MYAPP_RELEASE_STORE_FILE=release.jks
          MYAPP_RELEASE_STORE_PASSWORD=${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          MYAPP_RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }}
          MYAPP_RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}
          SIGNING_EOF
            echo "keystore=secret" >> "$GITHUB_OUTPUT"
            echo "✅ Signed with the persistent \`RELEASE_KEYSTORE_BASE64\` secret — this APK can be installed as an update over previous builds." >> "$GITHUB_STEP_SUMMARY"
          else
            PASS=$(openssl rand -base64 24 | tr -dc 'a-zA-Z0-9' | head -c 20)
            keytool -genkeypair -v \
              -keystore android/app/release.jks \
              -alias plantation-tracker \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "$PASS" -keypass "$PASS" \
              -dname "CN=Plantation Tracker, OU=DAE, O=DAE, L=Dhaka, ST=Dhaka, C=BD"
            cat >> android/gradle.properties << SIGNING_EOF
          MYAPP_RELEASE_STORE_FILE=release.jks
          MYAPP_RELEASE_STORE_PASSWORD=$PASS
          MYAPP_RELEASE_KEY_ALIAS=plantation-tracker
          MYAPP_RELEASE_KEY_PASSWORD=$PASS
          SIGNING_EOF
            echo "keystore=generated" >> "$GITHUB_OUTPUT"
            echo "⚠️ **No \`RELEASE_KEYSTORE_BASE64\` secret set — signed with a throwaway key generated just for this run.** This APK CANNOT be installed as an update over any other build (including this repo's own previous CI artifacts); testers must uninstall the old app first. Add the secret to fix this for good." >> "$GITHUB_STEP_SUMMARY"
          fi

      # 11. Build Release APK
      - name: Build Release APK
        run: cd android && ./gradlew assembleRelease --no-daemon

      # 12. Upload APK
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: plantation-tracker-signed-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      # 13. Cleanup
      - name: Cleanup Keystore & Signing Config
        if: always()
        run: |
          rm -f android/app/release.jks
          # Remove injected signing lines but keep original gradle.properties content
          if [ -f android/gradle.properties ]; then
            sed -i '/^MYAPP_RELEASE_/d' android/gradle.properties
          fi

      # 14. Build provenance — ties this APK to the exact commit that's also
      # deployed to Vercel, so "which build is live" is never ambiguous.
      - name: Build provenance summary
        if: always()
        run: |
          {
            echo "### 📦 Build provenance"
            echo "| | |"
            echo "|---|---|"
            echo "| Commit | \`${GITHUB_SHA::7}\` ([view](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})) |"
            echo "| Branch | \`${{ github.ref_name }}\` |"
            echo "| versionCode | ${{ github.run_number }} |"
            echo "| Matching web deploy | https://plantation-tracker.vercel.app (same commit, if this run is on \`main\`) |"
          } >> "$GITHUB_STEP_SUMMARY"