# Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m
org.gradle.parallel=true
org.gradle.caching=true

# AndroidX package structure
android.useAndroidX=true
android.enableJetifier=true

# Non-transitive R classes
android.nonTransitiveRClass=true

# Kotlin code style
kotlin.code.style=official

# Enables namespacing of each library's R class
android.nonFinalResIds=false

# Release signing config (override in ~/.gradle/gradle.properties for production)
MYAPP_RELEASE_STORE_FILE=release.keystore
MYAPP_RELEASE_STORE_PASSWORD=plantation2026
MYAPP_RELEASE_KEY_ALIAS=plantation
MYAPP_RELEASE_KEY_PASSWORD=plantation2026
